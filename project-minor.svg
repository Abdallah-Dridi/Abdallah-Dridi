<svg width="900" height="110" viewBox="0 0 900 110" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="110" fill="#0d1117"/>

  <!-- Left card: PatchStash -->
  <rect x="0" y="8" width="432" height="94" fill="#111519" rx="2"/>
  <rect x="0" y="8" width="3" height="94" fill="#ffffff" opacity="0.5"/>
  <text x="24" y="34" font-family="'Courier New', Courier, monospace" font-size="11" fill="#333333" letter-spacing="2">04</text>
  <text x="60" y="34" font-family="Georgia, serif" font-size="16" font-weight="700" fill="#e6edf3">PatchStash</text>
  <text x="15" y="58" font-family="Georgia, serif" font-size="12" fill="#8b949e" font-style="italic">Software vulnerability tracker dashboard.</text>
  <text x="15" y="74" font-family="Georgia, serif" font-size="12" fill="#8b949e" font-style="italic">CVEs are public data. Most teams still</text>
  <text x="15" y="90" font-family="Georgia, serif" font-size="12" fill="#8b949e" font-style="italic">track them in spreadsheets.</text>

  <!-- Right card: WireCat -->
  <rect x="448" y="8" width="452" height="94" fill="#111519" rx="2"/>
  <rect x="448" y="8" width="3" height="94" fill="#ffffff" opacity="0.5"/>
  <text x="472" y="34" font-family="'Courier New', Courier, monospace" font-size="11" fill="#333333" letter-spacing="2">05</text>
  <text x="508" y="34" font-family="Georgia, serif" font-size="16" font-weight="700" fill="#e6edf3">WireCat</text>
  <text x="463" y="58" font-family="Georgia, serif" font-size="12" fill="#8b949e" font-style="italic">Network packet analyzer for forensics</text>
  <text x="463" y="74" font-family="Georgia, serif" font-size="12" fill="#8b949e" font-style="italic">and protocol dissection. Every conversation</text>
  <text x="463" y="90" font-family="Georgia, serif" font-size="12" fill="#8b949e" font-style="italic">leaves a trace. This is how I read them.</text>
</svg>
