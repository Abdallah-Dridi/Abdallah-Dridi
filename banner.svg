<svg width="900" height="280" viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply" result="blend"/>
      <feComposite in="blend" in2="SourceGraphic" operator="in"/>
    </filter>
    <linearGradient id="fade-bottom" x1="0" y1="0" x2="0" y2="1">
      <stop offset="60%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="280" fill="#0d1117"/>

  <!-- Noise grain overlay -->
  <rect width="900" height="280" fill="#ffffff" opacity="0.025" filter="url(#grain)"/>

  <!-- Left accent bar -->
  <rect x="48" y="52" width="3" height="160" fill="#ffffff" opacity="0.9"/>

  <!-- Top rule -->
  <line x1="48" y1="52" x2="852" y2="52" stroke="#ffffff" stroke-width="1" opacity="0.15"/>

  <!-- Bottom rule -->
  <line x1="48" y1="228" x2="852" y2="228" stroke="#ffffff" stroke-width="1" opacity="0.15"/>

  <!-- Category label -->
  <text x="64" y="80" font-family="'Courier New', Courier, monospace" font-size="10" font-weight="400" letter-spacing="6" fill="#555555" text-anchor="start">SECURITY ENGINEERING / TEK-UP UNIVERSITY</text>

  <!-- Main name -->
  <text x="64" y="158" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="700" fill="#ffffff" text-anchor="start" opacity="0.97">ABDALLAH</text>
  <text x="64" y="218" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="700" fill="#ffffff" text-anchor="start" opacity="0.97">DRIDI</text>

  <!-- Right side editorial block -->
  <line x1="600" y1="72" x2="852" y2="72" stroke="#333333" stroke-width="1"/>
  <text x="602" y="95" font-family="'Courier New', Courier, monospace" font-size="11" fill="#666666" letter-spacing="2">CURRENT FOCUS</text>
  <text x="602" y="118" font-family="Georgia, serif" font-size="13" fill="#cccccc" font-style="italic">Blue Team · SOC Operations</text>
  <text x="602" y="138" font-family="Georgia, serif" font-size="13" fill="#cccccc" font-style="italic">Detection Engineering</text>
  <text x="602" y="158" font-family="Georgia, serif" font-size="13" fill="#cccccc" font-style="italic">Cloud Security · AWS</text>
  <line x1="600" y1="170" x2="852" y2="170" stroke="#333333" stroke-width="1"/>

  <text x="602" y="193" font-family="'Courier New', Courier, monospace" font-size="11" fill="#666666" letter-spacing="2">CREDENTIALS</text>
  <text x="602" y="213" font-family="'Courier New', Courier, monospace" font-size="11" fill="#888888">eJPT · RHCSA · AWS SAA</text>

  <!-- Fade at bottom of name area -->
  <rect x="48" y="170" width="530" height="60" fill="url(#fade-bottom)"/>
</svg>
